dataset:
  root: ./data
  mean: [0.4914, 0.4822, 0.4465]
  std: [0.247, 0.243, 0.261]

model:
  name: resnet_lite
  num_classes: 10

training:
  device: cuda
  batch_size: 128
  epochs: 40
  num_workers: 2

optimizer:
  lr: 0.001
  weight_decay: 0.0001

paths:
  models_dir: outputs/models
  logs_dir: outputs/logs
